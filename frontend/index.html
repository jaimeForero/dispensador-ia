<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dispensador IA</title>
    <link rel="stylesheet" href="/static/style.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.4/modules/talkinghead.mjs"
        }
    }
    </script>
</head>
<body>
    <!-- Canvas del avatar 3D -->
    <div id="avatar-container"></div>

    <!-- Overlay con info y controles -->
    <div id="info">
        <h1>🥤 Dispensador IA</h1>
        <p id="status">Inicializando...</p>
    </div>

    <!-- Controles para hablar -->
    <div id="controls">
        <textarea
            id="text-input"
            placeholder="Escribe lo que el avatar debe decir..."
            rows="2"
        >¡Hola! Bienvenido al dispensador. ¿Qué refresco te apetece hoy?</textarea>
        <button id="speak-button" disabled>🎤 Hacer hablar</button>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
